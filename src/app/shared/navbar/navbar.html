<header>
  <p-toolbar styleClass="app-navbar">
    <ng-template #start>
      <button
        pButton
        type="button"
        class="p-button-text p-button-rounded"
        [icon]="isSidebarCollapsed() ? 'pi pi-angle-right' : 'pi pi-angle-left'"
        [attr.aria-label]="isSidebarCollapsed() ? 'Mostrar menú lateral' : 'Ocultar menú lateral'"
        [attr.aria-expanded]="!isSidebarCollapsed()"
        (click)="onToggleSidebar()"
      ></button>

      <p-breadcrumb
        [model]="breadcrumbItems"
        [home]="breadcrumbHome"
        styleClass="app-navbar-breadcrumb"
      ></p-breadcrumb>
    </ng-template>

    <ng-template #end>
      <div class="actions">
        <om-theme-toggle
          themeTarget="html"
          lightThemeClass="app-light"
          darkThemeClass="app-dark"
          animationStyle="circle"
        ></om-theme-toggle>
        <button
          pButton
          type="button"
          icon="pi pi-sign-out"
          label="Logout"
          severity="danger"
          (click)="onLogout()"
        ></button>
      </div>
    </ng-template>
  </p-toolbar>
</header>
